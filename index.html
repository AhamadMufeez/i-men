<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      background-color: #f5f5dc;
    }
    header{
      padding: 0px;
      background-color: #c7692a;
      display: flex;
      align-items: center;
      height: 50px;
      gap: 10px;
    }
    #searchInput{
      flex: 1;
      padding: 5px;
      border: none;
      border-radius: 4px;
    }
     #menu ul {
      list-style-type: none;
      margin: 0;
      padding: 7px;
      line-height: 50px;
    }
    #menu{
      width:50%;
      height: 100vh;
      position: absolute;
      z-index:1 ;
      top: 0%;
      transition: left 0.3s ease;
      left: -100%;
    }
    #menu.open{
      left: 0;
    }
  </style>

  <title>I-men</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h2 id="menu-btn" style="margin-left: 7px;">☰</h2>
    <img src="imen-logo.jpeg" alt="I men logo" style="height: 30px;">
    <input type="text" id="searchInput" placeholder="Search...">
    <h2 style="font-size: 30px;">&#9825;</h2>
    <h2 style="font-size: 35px;">&#11044;</h2>
  </header>
  <div id="menu" style="color: #ffffff; background-color: #000000; padding: 0px;">
    <ul>
      <li>HOME</li>
      <li>NEW IN</li>
      <li>SALE</li>
      <li>PRODUCTS</li>
      <li>ABOUT</li>
      <li>CONTACT</li>
    </ul>
  </div>
  <script>
    const menuBtn = document.getElementById('menu-btn');
    const menu = document.getElementById('menu');
    menuBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      menu.classList.toggle('open');
    });
    
    document.addEventListener('click', (event) => {
      if (!menu.contains(event.target) && !menuBtn.contains(event.target)) {
        menu.classList.remove('open')
      }
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
