<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      background-color: #f5f5dc;
    }
    header{
      padding: 0px;
      background-color: #c7692a;
      display: flex;
      align-items: center;
      height: 50px;
      gap: 10px;
    }
    #searchInput{
      flex: 1;
      padding: 5px;
      border: none;
      border-radius: 4px;
    }
     #menu ul {
      list-style-type: none;
      margin: 0;
      padding: 7px;
      line-height: 50px;
    }
    #menu{
      width:50%;
      height: 100vh;
      position: absolute;
      z-index:1 ;
      top: 0%;
      transition: left 0.3s ease;
      left: -100%;
    }
    #menu.open{
      left: 0;
    }
    #navbar img{
      object-fit: cover;
      height: 70px;
      width: 70px;
      border-radius: 50%;
      clip-path: circle(50%);
    }
  </style>

  <title>I-men</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header>
    <h2 id="menu-btn" style="margin-left: 7px;">☰</h2>
    <img src="imen-logo.jpeg" alt="I men logo" style="height: 30px;">
    <input type="text" id="searchInput" placeholder="Search...">
    <h2 style="font-size: 30px;">&#9825;</h2>
    <h2 style="font-size: 35px;">&#11044;</h2>
  </header>
  <div id="menu" style="color: #ffffff; background-color: #000000; padding: 0px;">
    <ul>
      <li id="home-btn">HOME</li>
      <li id="new-in-btn">NEW IN</li>
      <li id="sale-btn" >SALE</li>
      <li id="products-btn">PRODUCTS</li>
      <li id="about-btn">ABOUT</li>
      <li id="contact-btn">CONTACT</li>
    </ul>
  </div>
  <div id="navbar" style="display: flex; gap: 7px; padding: 10px; background-color: #ffffff;">
    <img src="icons-for-nav\best-seller-icon.png" alt="Best Seller Icon" ">
    <img src="icons-for-nav\sale-icon.png" alt="Sale Icon" ">
    <img src="icons-for-nav\all-styles-icon.png" alt="All Styles Icon" ">
    <img src="icons-for-nav\t-shirt-icon.jpeg" alt="T-shirt icon">
  </div>
  <script>
    const menuBtn = document.getElementById('menu-btn');
    const menu = document.getElementById('menu');
    menuBtn.addEventListener('click', (event) => {
      event.stopPropagation();
      menu.classList.toggle('open');
    });
    
    document.addEventListener('click', (event) => {
      if (!menu.contains(event.target) && !menuBtn.contains(event.target)) {
        menu.classList.remove('open')
      }
    });

    const homeBtn = document.getElementById('home-btn');
    const newInBtn = document.getElementById('new-in-btn');
    const saleBtn = document.getElementById('sale-btn');
    const productsBtn = document.getElementById('products-btn');
    const aboutBtn = document.getElementById('about-btn');
    const contactBtn = document.getElementById('contact-btn');

    homeBtn.addEventListener('click', () => {
      location.reload();
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
